<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멋쟁이사자처럼 CRUD 게시판</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div>
      <p class="club-name">LIKELION DATABASE SESSION</p>
      <h1>CRUD 게시판 실습</h1>
    </div>
    <span class="badge">HTML · CSS · JS</span>
  </header>

  <main class="layout">
    <section class="editor" aria-labelledby="form-title">
      <h2 id="form-title">게시글 작성</h2>
      <form id="post-form">
        <input type="hidden" id="post-id">

        <label for="title">제목</label>
        <input id="title" type="text" placeholder="제목을 입력하세요" required>

        <label for="author">작성자</label>
        <input id="author" type="text" placeholder="이름을 입력하세요" required>

        <label for="content">내용</label>
        <textarea id="content" rows="8" placeholder="내용을 입력하세요" required></textarea>

        <div class="actions">
          <button type="submit" id="submit-button">등록</button>
          <button type="button" id="cancel-button" class="secondary" hidden>취소</button>
        </div>
      </form>
    </section>

    <section class="board" aria-labelledby="board-title">
      <div class="board-head">
        <div>
          <h2 id="board-title">게시글 목록</h2>
          <p>현재 데이터는 브라우저 메모리에만 있습니다.</p>
        </div>
        <strong id="post-count">0개</strong>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>제목</th>
              <th>작성자</th>
              <th>작성일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="post-list"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
